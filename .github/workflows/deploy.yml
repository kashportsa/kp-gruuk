name: CI/CD

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: 805149719934.dkr.ecr.us-east-2.amazonaws.com
  ECR_REPO: gruuk-server
  SERVICE_NAME: gruuk
  SERVER_HOST: 3.150.180.28
  SERVER_USER: ec2-user
  EC2_SG_ID: sg-0a2ca3b7c32a099b0

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests
        run: go test -race ./...

  version:
    name: Version
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      changelog: ${{ steps.tag.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

  build-server:
    name: Build server image
    needs: version
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.push.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        id: push
        run: |
          VERSION="${{ needs.version.outputs.new_tag }}"
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPO}:${VERSION}"
          docker build -f Dockerfile.server \
            -t "${FULL_IMAGE}" \
            -t "${ECR_REGISTRY}/${ECR_REPO}:latest" .
          docker push "${FULL_IMAGE}"
          docker push "${ECR_REGISTRY}/${ECR_REPO}:latest"
          echo "image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"

  build-client:
    name: Build client binaries
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        run: |
          VERSION="${{ needs.version.outputs.new_tag }}"
          LDFLAGS="-s -w -X github.com/kashportsa/kp-gruuk/internal/client.version=${VERSION}"
          mkdir -p dist
          for GOOS in darwin linux; do
            for GOARCH in amd64 arm64; do
              CGO_ENABLED=0 GOOS=${GOOS} GOARCH=${GOARCH} go build \
                -ldflags "${LDFLAGS}" \
                -o "dist/gruuk-${GOOS}-${GOARCH}" \
                ./cmd/gruuk
            done
          done

      - uses: actions/upload-artifact@v4
        with:
          name: client-binaries
          path: dist/

  deploy:
    name: Deploy to EC2
    needs: build-server
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-gruuk
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Open SSH access for runner
        id: ssh-access
        run: |
          RUNNER_IP=$(curl -s https://checkip.amazonaws.com)
          echo "runner_ip=${RUNNER_IP}" >> "$GITHUB_OUTPUT"
          aws ec2 authorize-security-group-ingress \
            --group-id "${EC2_SG_ID}" \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32"
          sleep 5

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/opt/apps/${{ env.SERVICE_NAME }}/"

      - name: Deploy
        uses: appleboy/ssh-action@v1
        env:
          IMAGE: ${{ needs.build-server.outputs.image }}
          OKTA_ISSUER: ${{ secrets.GRUUK_OKTA_ISSUER }}
          OKTA_CLIENT_ID: ${{ secrets.GRUUK_OKTA_CLIENT_ID }}
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: IMAGE,SERVICE_NAME,ECR_REGISTRY,ECR_REPO,OKTA_ISSUER,OKTA_CLIENT_ID
          script: |
            set -euo pipefail

            DIR="/opt/apps/${SERVICE_NAME}"
            mkdir -p "${DIR}"
            cd "${DIR}"

            cat > .env <<EOF
            OKTA_ISSUER=${OKTA_ISSUER}
            OKTA_CLIENT_ID=${OKTA_CLIENT_ID}
            EOF
            chmod 600 .env

            export DOCKER_CONFIG=$(mktemp -d)
            aws ecr get-login-password --region us-east-2 | \
              docker login --username AWS --password-stdin "${ECR_REGISTRY}"

            export IMAGE="${IMAGE}"
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

            echo "Deployed ${SERVICE_NAME}: ${IMAGE}"

      - name: Revoke SSH access
        if: always()
        env:
          RUNNER_IP: ${{ steps.ssh-access.outputs.runner_ip }}
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id "${EC2_SG_ID}" \
            --protocol tcp \
            --port 22 \
            --cidr "${RUNNER_IP}/32" || true

  release:
    name: GitHub release
    needs: [version, build-client]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: client-binaries
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.new_tag }}
          name: Release ${{ needs.version.outputs.new_tag }}
          body: ${{ needs.version.outputs.changelog }}
          files: dist/*
